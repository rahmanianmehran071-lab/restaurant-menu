<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>شب‌نشین | منوی رستوران</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
/* ══ RESET & TOKENS ══════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#C9A84C;--gold-l:#E8C97A;--gold-d:#8B6914;--gold-p:#F5E6C0;
  --bg:#0D0B07;--bg-c:#1A1610;--bg-s:#12100C;
  --tx:#F2E8D0;--tm:#9A8B6E;--tg:#E8C97A;
  --bc-g:rgba(201,168,76,.3);--bc-c:rgba(201,168,76,.15);
  --gfg:#6BCF8A;--gbg:rgba(26,74,42,.5);--gbd:rgba(107,207,138,.25);
  --rfg:#F08080;
  --r-sm:576px;--r-md:768px;--r-lg:1024px;
}
html{scroll-behavior:smooth}
body{
  min-height:100%;background:var(--bg);color:var(--tx);
  font-family:'Vazirmatn',sans-serif;direction:rtl;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bc-g);border-radius:2px}

/* ══ HEADER ══════════════════════════════════════════════════ */
.site-header{
  background:var(--bg-c);border-bottom:1px solid var(--bc-g);
  position:sticky;top:0;z-index:200;
}
.header-inner{
  max-width:1200px;margin:0 auto;padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;
  height:62px;gap:12px;
}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-icon{font-size:24px;line-height:1}
.logo-text{font-size:18px;font-weight:700;color:var(--gold-l);letter-spacing:1px}
.logo-sub{font-size:9px;color:var(--tm);letter-spacing:2px;display:block;margin-top:1px}
.header-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.header-meta span{font-size:12px;color:var(--tm);display:flex;align-items:center;gap:5px;white-space:nowrap}
.open-badge{
  background:var(--gbg);color:var(--gfg);border:1px solid var(--gbd);
  font-size:11px;padding:4px 11px;border-radius:20px;font-weight:600;flex-shrink:0;
}

/* ══ HERO ════════════════════════════════════════════════════ */
.hero{
  background:linear-gradient(135deg,#0D0B07 0%,#1A1208 50%,#0D0B07 100%);
  border-bottom:1px solid var(--bc-g);
  padding:44px 20px 36px;text-align:center;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 90% at 50% 50%,rgba(201,168,76,.08),transparent);
  pointer-events:none;
}
.hero-ornament{font-size:16px;color:var(--tm);letter-spacing:10px;margin-bottom:12px;position:relative}
.hero-title{font-size:44px;font-weight:900;color:var(--gold-l);letter-spacing:2px;position:relative;line-height:1.1}
.hero-sub{font-size:12px;color:var(--tm);margin-top:8px;letter-spacing:3px;position:relative}
.hero-info{
  display:flex;justify-content:center;gap:20px;margin-top:20px;
  position:relative;flex-wrap:wrap;
}
.hero-info-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--tm)}
.hero-divider{width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:18px auto 0;position:relative}

/* ══ SEARCH ══════════════════════════════════════════════════ */
.search-section{padding:18px 20px 0;max-width:600px;margin:0 auto;position:relative}
.search-box{
  width:100%;padding:12px 16px 12px 42px;
  background:var(--bg-c);border:1px solid var(--bc-g);border-radius:40px;
  color:var(--tx);font-family:'Vazirmatn',sans-serif;font-size:14px;outline:none;
  transition:border-color .2s;
}
.search-box:focus{border-color:var(--gold)}
.search-box::placeholder{color:var(--tm)}
.search-icon{
  position:absolute;left:36px;top:50%;transform:translateY(-50%);
  color:var(--tm);font-size:17px;pointer-events:none;margin-top:9px;
}

/* ══ CATEGORY PILLS (mobile/tablet horizontal scroll) ═══════ */
.cat-pills-wrap{
  overflow-x:auto;padding:14px 20px;
  border-bottom:1px solid var(--bc-c);
  scrollbar-width:none;-ms-overflow-style:none;
  position:sticky;top:62px;z-index:100;background:var(--bg-s);
}
.cat-pills-wrap::-webkit-scrollbar{display:none}
.cat-pills{display:flex;gap:8px;width:max-content}
.cp{
  padding:7px 16px;border:1px solid var(--bc-g);background:transparent;
  color:var(--tm);cursor:pointer;border-radius:30px;
  font-family:'Vazirmatn',sans-serif;font-size:12px;
  white-space:nowrap;transition:all .2s;flex-shrink:0;
  display:flex;align-items:center;gap:5px;
}
.cp:hover{color:var(--tg);border-color:var(--gold-d)}
.cp.active{background:var(--gold-d);color:var(--gold-p);border-color:var(--gold)}

/* ══ PAGE LAYOUT ═════════════════════════════════════════════ */
.page{max-width:1200px;margin:0 auto;padding:28px 20px 80px;display:flex;gap:28px}
.sidebar-col{width:210px;flex-shrink:0}
.cat-sticky{position:sticky;top:130px}
.cs-title{font-size:10px;color:var(--tm);letter-spacing:2px;margin-bottom:10px;padding-right:4px}
.cs-btn{
  display:flex;align-items:center;gap:9px;width:100%;
  padding:9px 12px;border-radius:9px;cursor:pointer;
  font-size:13px;color:var(--tm);transition:all .2s;
  border:1px solid transparent;margin-bottom:3px;
  background:transparent;text-align:right;font-family:'Vazirmatn',sans-serif;
}
.cs-btn:hover{background:rgba(201,168,76,.07);color:var(--tg)}
.cs-btn.active{background:rgba(201,168,76,.14);color:var(--gold-l);border-color:var(--bc-g)}
.cs-icon{font-size:17px;flex-shrink:0}
.cs-count{margin-right:auto;font-size:11px;color:var(--tm)}
.main-col{flex:1;min-width:0}

/* ══ CATEGORY SECTION ════════════════════════════════════════ */
.cat-section{margin-bottom:44px;scroll-margin-top:130px}
.cat-heading{
  display:flex;align-items:center;gap:12px;
  font-size:18px;font-weight:700;color:var(--gold-l);
  margin-bottom:18px;padding-bottom:12px;
  border-bottom:1px solid var(--bc-g);position:relative;
}
.cat-heading::after{content:'';position:absolute;bottom:-1px;right:0;width:50px;height:2px;background:var(--gold)}
.cat-heading-icon{
  width:32px;height:32px;background:rgba(201,168,76,.12);border:1px solid var(--bc-c);
  border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
}
.cat-count{font-size:12px;color:var(--tm);margin-right:auto}

/* ══ ITEMS GRID ══════════════════════════════════════════════ */
/* Desktop: 3 cols | Tablet: 2 cols | Mobile: 1 col (horizontal card) */
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}

/* ── CARD (default = vertical) ── */
.menu-card{
  background:var(--bg-c);border:1px solid var(--bc-c);border-radius:14px;
  overflow:hidden;transition:border-color .25s,transform .25s,box-shadow .25s;
}
.menu-card:hover{border-color:var(--bc-g);transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.45)}
.card-img-wrap{width:100%;height:150px;overflow:hidden;flex-shrink:0}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .35s;display:block}
.menu-card:hover .card-img-wrap img{transform:scale(1.05)}
.card-emoji{
  width:100%;height:150px;
  background:linear-gradient(135deg,#1A1208,#241808);
  display:flex;align-items:center;justify-content:center;font-size:54px;
  flex-shrink:0;
}
.card-body{padding:14px;display:flex;flex-direction:column;flex:1}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px}
.card-name{font-size:14px;font-weight:600;color:var(--tx);line-height:1.4}
.card-desc{font-size:12px;color:var(--tm);line-height:1.7;margin-bottom:12px;flex:1}
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-price{font-size:16px;font-weight:700;color:var(--gold-l);white-space:nowrap}
.price-unit{font-size:11px;color:var(--tm);font-weight:400;margin-right:2px}
.badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;flex-shrink:0;white-space:nowrap}
.badge-new{background:rgba(26,74,42,.6);color:var(--gfg);border:1px solid var(--gbd)}
.badge-hot{background:rgba(139,32,32,.6);color:#F08080;border:1px solid rgba(240,128,128,.3)}
.badge-off{background:rgba(139,90,0,.6);color:#FFB347;border:1px solid rgba(255,179,71,.3)}

/* ══ LOADING / EMPTY ═════════════════════════════════════════ */
.loading{text-align:center;padding:80px 20px;color:var(--tm)}
.spinner{
  width:38px;height:38px;border:3px solid var(--bc-c);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin 1s linear infinite;margin:0 auto 14px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;color:var(--tm);font-size:14px}
.empty-state i{font-size:44px;display:block;margin-bottom:12px;opacity:.5}

/* ══ BACK TO TOP ═════════════════════════════════════════════ */
.btt{
  position:fixed;left:20px;bottom:24px;z-index:300;
  width:44px;height:44px;border-radius:50%;
  background:var(--gold-d);border:1px solid var(--gold);color:var(--gold-p);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;
  opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;
  box-shadow:0 4px 16px rgba(0,0,0,.4);
}
.btt.visible{opacity:1;pointer-events:auto}
.btt:hover{transform:translateY(-2px)}

/* ══ FOOTER ══════════════════════════════════════════════════ */
.site-footer{
  background:var(--bg-c);border-top:1px solid var(--bc-g);
  text-align:center;padding:22px 20px;
}
.footer-logo{font-size:16px;font-weight:600;color:var(--gold-l);margin-bottom:8px}
.footer-info{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:10px}
.footer-info span{font-size:12px;color:var(--tm);display:flex;align-items:center;gap:5px}
.footer-copy{font-size:11px;color:var(--tm);opacity:.5}

/* ══ RESPONSIVE ══════════════════════════════════════════════ */

/* ── Tablet (≤900px) ── */
@media(max-width:900px){
  .sidebar-col{display:none}
  .page{padding:20px 16px 80px}
  .items-grid{grid-template-columns:repeat(2,1fr)}
}

/* ── Mobile (≤600px): horizontal cards ── */
@media(max-width:600px){
  /* header */
  .header-inner{height:56px;padding:0 16px}
  .logo-icon{font-size:20px}
  .logo-text{font-size:16px}
  .header-meta .hm-extra{display:none}  /* hide phone + hours */
  .open-badge{font-size:10px;padding:3px 9px}

  /* hero */
  .hero{padding:32px 16px 26px}
  .hero-ornament{font-size:13px;letter-spacing:6px}
  .hero-title{font-size:32px;letter-spacing:1px}
  .hero-sub{font-size:11px;letter-spacing:2px}
  .hero-info{gap:12px}
  .hero-info-item{font-size:11px}

  /* search */
  .search-section{padding:14px 16px 0}
  .search-box{font-size:13px;padding:11px 14px 11px 38px}
  .search-icon{left:30px;font-size:16px}

  /* cat pills */
  .cat-pills-wrap{top:56px;padding:12px 16px}
  .cp{font-size:12px;padding:6px 13px}

  /* page */
  .page{padding:16px 12px 80px;gap:0}
  .cat-section{margin-bottom:32px;scroll-margin-top:120px}
  .cat-heading{font-size:16px;margin-bottom:14px}

  /* cards → horizontal layout on mobile */
  .items-grid{
    grid-template-columns:1fr;
    gap:10px;
  }
  .menu-card{
    display:flex;flex-direction:row;
    border-radius:12px;
  }
  .card-img-wrap{
    width:110px;height:110px;flex-shrink:0;
    border-radius:12px 0 0 12px;
  }
  .card-emoji{
    width:110px;height:110px;flex-shrink:0;
    font-size:38px;border-radius:12px 0 0 12px;
  }
  .card-body{padding:12px 12px 12px 12px}
  .card-name{font-size:13px;margin-bottom:3px}
  .card-desc{font-size:11px;line-height:1.6;margin-bottom:8px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-price{font-size:14px}
  .badge{font-size:10px;padding:2px 7px}
  /* no hover transform on mobile */
  .menu-card:hover{transform:none;box-shadow:none}

  /* back to top */
  .btt{left:16px;bottom:20px;width:40px;height:40px;font-size:16px}

  /* footer */
  .site-footer{padding:18px 16px}
  .footer-info{gap:12px}
  .footer-info span{font-size:11px}
}

/* ── Very small phones (≤380px) ── */
@media(max-width:380px){
  .hero-title{font-size:26px}
  .card-img-wrap,.card-emoji{width:90px;height:90px}
}
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🕯️</div>
      <div>
        <div class="logo-text">شب‌نشین</div>
        <span class="logo-sub">رستوران سنتی</span>
      </div>
    </div>
    <div class="header-meta">
      <span class="hm-extra"><i class="ti ti-clock"></i>۱۲:۰۰ تا ۲۴:۰۰</span>
      <span class="hm-extra"><i class="ti ti-phone"></i>۰۲۱-۱۲۳۴۵۶۷۸</span>
      <span class="open-badge">● باز است</span>
    </div>
  </div>
</header>

<!-- ══ HERO ══ -->
<div class="hero">
  <div class="hero-ornament">✦ ✦ ✦</div>
  <div class="hero-title">شب‌نشین</div>
  <div class="hero-sub">طعم اصیل ایران در هر لقمه</div>
  <div class="hero-info">
    <div class="hero-info-item"><i class="ti ti-clock" style="color:var(--gold)"></i>۱۲:۰۰ تا ۲۴:۰۰</div>
    <div class="hero-info-item"><i class="ti ti-map-pin" style="color:var(--gold)"></i>جهرم، خیابان خیام</div>
    <div class="hero-info-item"><i class="ti ti-phone" style="color:var(--gold)"></i>071-4234578</div>
  </div>
  <div class="hero-divider"></div>
</div>

<!-- ══ SEARCH ══ -->
<div class="search-section">
  <i class="ti ti-search search-icon"></i>
  <input class="search-box" id="search" type="search" placeholder="جستجو در منو..." oninput="doSearch()" autocomplete="off">
</div>

<!-- ══ CATEGORY PILLS ══ -->
<div class="cat-pills-wrap">
  <div class="cat-pills" id="cat-pills"></div>
</div>

<!-- ══ PAGE ══ -->
<div class="page">
  <!-- Desktop sidebar -->
  <aside class="sidebar-col">
    <div class="cat-sticky">
      <div class="cs-title">دسته‌بندی‌ها</div>
      <div id="cat-sidebar"></div>
    </div>
  </aside>

  <!-- Content -->
  <main class="main-col">
    <div id="menu-content">
      <div class="loading">
        <div class="spinner"></div>
        <div>در حال بارگذاری منو...</div>
      </div>
    </div>
  </main>
</div>

<!-- ══ BACK TO TOP ══ -->
<button class="btt" id="btt" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <i class="ti ti-arrow-up"></i>
</button>

<!-- ══ FOOTER ══ -->
<footer class="site-footer">
  <div class="footer-logo">🕯️ شب‌نشین</div>
  <div class="footer-info">
    <span><i class="ti ti-map-pin"></i>جهرم، خیابان خیام</span>
    <span><i class="ti ti-phone"></i>071-4234578</span>
    <span><i class="ti ti-clock"></i>۱۲:۰۰ تا ۲۴:۰۰</span>
  </div>
  <div class="footer-copy">© تمام حقوق محفوظ است</div>
</footer>

<script>
/* ── State ── */
let ALL_CATS  = [];
let ALL_ITEMS = [];
let activeCat = 'all';

/* ── API ── */
async function init() {
  try {
    const [cats, items] = await Promise.all([
      fetch('/api/categories').then(r => r.json()),
      fetch('/api/items?active=true').then(r => r.json()),
    ]);
    ALL_CATS  = cats;
    ALL_ITEMS = items;
    buildNav();
    renderMenu();
  } catch(e) {
    document.getElementById('menu-content').innerHTML =
      '<div class="empty-state"><i class="ti ti-alert-circle"></i>خطا در بارگذاری منو</div>';
  }
}

/* ── Build navigation (pills + sidebar) ── */
function buildNav() {
  const usedCats = [...new Set(ALL_ITEMS.map(i => i.cat))];

  /* Pills */
  document.getElementById('cat-pills').innerHTML =
    `<button class="cp active" onclick="filterCat('all')">🍽 همه</button>` +
    usedCats.map(cid => {
      const c = ALL_CATS.find(x => x.id===cid) || {icon:'🍽', name:cid};
      return `<button class="cp" data-cat="${cid}" onclick="filterCat('${cid}')">${c.icon} ${c.name}</button>`;
    }).join('');

  /* Sidebar */
  document.getElementById('cat-sidebar').innerHTML =
    `<button class="cs-btn active" onclick="filterCat('all')">
       <span class="cs-icon">🍽</span>همه غذاها
       <span class="cs-count">${ALL_ITEMS.length}</span>
     </button>` +
    usedCats.map(cid => {
      const c   = ALL_CATS.find(x => x.id===cid) || {icon:'🍽', name:cid};
      const cnt = ALL_ITEMS.filter(i => i.cat===cid).length;
      return `<button class="cs-btn" data-cat="${cid}" onclick="filterCat('${cid}')">
        <span class="cs-icon">${c.icon}</span>${c.name}
        <span class="cs-count">${cnt}</span>
      </button>`;
    }).join('');
}

/* ── Filter by category ── */
function filterCat(cid) {
  activeCat = cid;
  document.querySelectorAll('.cp, .cs-btn').forEach(b => {
    const bc = b.dataset.cat || 'all';
    b.classList.toggle('active', bc === cid);
  });
  document.getElementById('search').value = '';
  renderMenu();
  /* scroll pills to active item */
  const pill = document.querySelector(`.cp[data-cat="${cid}"]`);
  if (pill) pill.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
}

/* ── Search ── */
function doSearch() {
  activeCat = 'all';
  document.querySelectorAll('.cp, .cs-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  renderMenu();
}

/* ── Render items ── */
function renderMenu() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  let items = ALL_ITEMS;
  if (activeCat !== 'all') items = items.filter(i => i.cat === activeCat);
  if (q) items = items.filter(i =>
    i.name.toLowerCase().includes(q) || (i.desc||'').toLowerCase().includes(q));

  const el = document.getElementById('menu-content');
  if (!items.length) {
    el.innerHTML = '<div class="empty-state"><i class="ti ti-search"></i>آیتمی یافت نشد</div>';
    return;
  }
  const byCat = {};
  items.forEach(i => { (byCat[i.cat] = byCat[i.cat]||[]).push(i); });

  el.innerHTML = Object.entries(byCat).map(([cid, its]) => {
    const cat = ALL_CATS.find(c => c.id===cid) || {icon:'🍽', name:cid};
    return `
      <div class="cat-section" id="sec-${cid}">
        <div class="cat-heading">
          <div class="cat-heading-icon">${cat.icon}</div>
          ${cat.name}
          <span class="cat-count">${its.length} آیتم</span>
        </div>
        <div class="items-grid">${its.map(card).join('')}</div>
      </div>`;
  }).join('');
}

/* ── Card template ── */
function card(item) {
  const bm = {
    new: ['badge-new','🌿 جدید'],
    hot: ['badge-hot','🔥 پرطرفدار'],
    off: ['badge-off','⭐ ویژه']
  };
  const badge = item.badge && bm[item.badge]
    ? `<span class="badge ${bm[item.badge][0]}">${bm[item.badge][1]}</span>` : '';
  const imgHtml = item.img && item.img.startsWith('/')
    ? `<div class="card-img-wrap"><img src="${item.img}" alt="${item.name}" loading="lazy"></div>`
    : `<div class="card-emoji">${item.img || '🍽'}</div>`;
  return `
    <div class="menu-card">
      ${imgHtml}
      <div class="card-body">
        <div class="card-top">
          <div class="card-name">${item.name}</div>
          ${badge}
        </div>
        <div class="card-desc">${item.desc || ''}</div>
        <div class="card-footer">
          <div class="card-price">${Number(item.price).toLocaleString('fa-IR')}<span class="price-unit">تومان</span></div>
        </div>
      </div>
    </div>`;
}

/* ── Back-to-top ── */
window.addEventListener('scroll', () => {
  document.getElementById('btt').classList.toggle('visible', window.scrollY > 300);
}, {passive:true});

init();
</script>
</body>
</html>
